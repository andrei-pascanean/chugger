<!-- Architecture: html + Bootstrap css + vanilla JS, single file -->

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chugger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <style>
        html,
        body {
            height: 100%;
            min-height: -webkit-fill-available;
            margin: 0;
            overflow: hidden;
        }

        button {
            font-size: 16px;
        }

        #message {
            transition: opacity 0.5s;
        }

        @keyframes bubble1 {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) scale(0.8);
                opacity: 0;
            }
        }

        @keyframes bubble2 {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.25;
            }
            100% {
                transform: translateY(-80px) scale(0.9);
                opacity: 0;
            }
        }

        @keyframes bubble3 {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.2;
            }
            100% {
                transform: translateY(-60px) scale(1);
                opacity: 0;
            }
        }

        .animate-bubble1 {
            animation: bubble1 2s infinite ease-in-out;
        }

        .animate-bubble2 {
            animation: bubble2 3s infinite ease-in-out 1s;
        }

        .animate-bubble3 {
            animation: bubble3 2.5s infinite ease-in-out 0.5s;
        }
    </style>
</head>

<body>
    <div class="container-fluid d-flex flex-column justify-content-center align-items-center min-vh-100">
        <div class="col-10">
            <div class="row mb-4">
                <div class="text-center">
                    <h1 id="appTitle" class="display-5">💧 Chug a glass of water!</h1>
                </div>
            </div>
            <div class="row mb-4 text-center">
                <h2>It is recommended to drink at least 8 glasses of water a day. <br>Make sure you get your fill!</h2>
            </div>
            <div class="row mb-4">
                <div id="glass" class="d-flex justify-content-center p-3">
                    <div
                        style="width: 100px; height: 200px; border: 2px solid white; position: relative; border-bottom-left-radius: 40%; border-bottom-right-radius: 40%; overflow: hidden;">
                        <div id="liquid"
                            style="position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background-color: #4299e1; border-bottom-left-radius: 40%; border-bottom-right-radius: 40%; transition: height 0.5s; overflow: hidden;">
                            <!-- Bubbles inside liquid so they clip at the surface -->
                            <div id="bubbles">
                                <div class="bubble animate-bubble1"
                                    style="position: absolute; bottom: 0; left: 33%; width: 8px; height: 8px; background: white; border-radius: 50%; opacity: 0.3;">
                                </div>
                                <div class="bubble animate-bubble2"
                                    style="position: absolute; bottom: 0; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; opacity: 0.25;">
                                </div>
                                <div class="bubble animate-bubble3"
                                    style="position: absolute; bottom: 0; left: 66%; width: 4px; height: 4px; background: white; border-radius: 50%; opacity: 0.2;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mb-4 justify-content-center mx-auto">
                <div class="col-auto">
                    <button id="chuggButton" type="button" class="btn btn-primary btn-lg px-4">Chugg</button>
                </div>
            </div>
            <div class="row mb-3">
                <p id="message" class="text-center" style="height: 50px; opacity: 0;">
                </p>
            </div>
            <div class="row mb-3 justify-content-center">
                <div class="text-center">
                    <select id="drinkSelector" class="form-select w-auto mx-auto">
                        <option value="Water">Water</option>
                        <option value="Juice">Juice</option>
                        <option value="Coke">Coke</option>
                    </select>
                </div>
            </div>
            <div class="row justify-content-center align-items-center mt-4 gx-2">
                <div class="col-auto">
                    Glasses chugged:
                </div>
                <div class="col-auto">
                    <div class="progress" style="width: 200px;">
                        <div id="chuggTracker" class="progress-bar bg-primary" style="width: 0%"></div>
                    </div>
                </div>
                <div class="col-auto">
                    <span id="glassCount">0 / 8</span>
                </div>
            </div>
        </div>
    </div>
</body>

<script>
    const GOAL = 8;

    const chuggButton = document.getElementById("chuggButton");
    const liquidDiv = document.getElementById("liquid");
    const messageP = document.getElementById("message");
    const chuggTracker = document.getElementById("chuggTracker");
    const appTitle = document.getElementById("appTitle");
    const glassCount = document.getElementById("glassCount");
    const bubbles = document.getElementById("bubbles");

    let liquidLevel = 100;
    let chuggedGlasses = 0; // integer count of completed glasses

    // localStorage persistence with daily reset
    const today = new Date().toDateString();
    const saved = JSON.parse(localStorage.getItem('chugger') || '{}');
    if (saved.date === today) {
        chuggedGlasses = saved.count || 0;
    }

    // Update UI from loaded state
    chuggTracker.style.width = Math.min((chuggedGlasses / GOAL) * 100, 100) + "%";
    glassCount.textContent = `${chuggedGlasses} / ${GOAL}`;

    let fadeTimeout;

    chuggButton.addEventListener('click', function () {
        if (liquidLevel > 0) {
            liquidLevel -= 20;
            liquidDiv.style.height = liquidLevel + "%";

            if (liquidLevel === 0) {
                messageP.textContent = "All done!";
                messageP.style.opacity = "1";
                if (fadeTimeout) clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(function () {
                    messageP.style.opacity = "0";
                }, 3000);

                chuggButton.classList.remove("btn-primary");
                chuggButton.classList.add("btn-success");
                chuggButton.textContent = "Refill";
                bubbles.style.display = "none";

                chuggedGlasses++;
                chuggTracker.style.width = Math.min((chuggedGlasses / GOAL) * 100, 100) + "%";
                glassCount.textContent = `${chuggedGlasses} / ${GOAL}`;
                localStorage.setItem('chugger', JSON.stringify({ date: today, count: chuggedGlasses }));
            } else {
                messageP.textContent = "glug";
                messageP.style.opacity = "1";
                if (fadeTimeout) clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(function () {
                    messageP.style.opacity = "0";
                }, 1500);
            }
        } else {
            liquidLevel = 100;
            liquidDiv.style.height = liquidLevel + "%";
            chuggButton.classList.remove("btn-success");
            chuggButton.classList.add("btn-primary");
            chuggButton.textContent = "Chugg";
            bubbles.style.display = "";
        }
    });

    // Selecting a different drink resets the glass
    const drinkSelector = document.getElementById("drinkSelector");

    drinkSelector.addEventListener('change', function (event) {
        const selectedDrink = event.target.value;

        liquidDiv.style.height = "0%";

        // Reset JS state
        liquidLevel = 100;
        chuggButton.classList.remove("btn-success");
        chuggButton.classList.add("btn-primary");
        chuggButton.textContent = "Chugg";

        setTimeout(function () {
            if (selectedDrink === "Water") {
                liquidDiv.style.backgroundColor = "#4299e1";
                appTitle.innerHTML = "💧 Chug a glass of water!";
            } else if (selectedDrink === "Juice") {
                liquidDiv.style.backgroundColor = "#FFB347";
                appTitle.innerHTML = "🧃 Chug a glass of juice!";
            } else if (selectedDrink === "Coke") {
                liquidDiv.style.backgroundColor = "#3C1414";
                appTitle.innerHTML = "🥤 Chug a glass of coke!";
            }
            liquidDiv.style.height = "100%";
            bubbles.style.display = "";
        }, 500);
    });
</script>

</html>
